steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '--build-arg','VITE_PRINT_RELAY_URL=${_VITE_PRINT_RELAY_URL}',
        '--build-arg','VITE_PRINT_RELAY_API_KEY=${_VITE_PRINT_RELAY_API_KEY}',
        '--build-arg','VITE_PRINT_RELAY_PC_ID=${_VITE_PRINT_RELAY_PC_ID}',
        '-t','${_AR_REPO}/order-collector:${SHORT_SHA}',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_AR_REPO}/order-collector:${SHORT_SHA}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run','deploy','${_SERVICE_NAME}',
        '--image','${_AR_REPO}/order-collector:${SHORT_SHA}',
        '--region','${_REGION}',
        '--platform','managed',
        '--port','8080',
        '--allow-unauthenticated',
        '--timeout','300',
        '--set-env-vars','BASE_URL=${_BASE_URL},SHOPIFY_CLIENT_ID=${_SHOPIFY_CLIENT_ID},SHOPIFY_CLIENT_SECRET=${_SHOPIFY_CLIENT_SECRET},SHOPIFY_CLIENT_ID_NEWSTORENAME=${_SHOPIFY_CLIENT_ID_NEWSTORENAME},SHOPIFY_CLIENT_SECRET_NEWSTORENAME=${_SHOPIFY_CLIENT_SECRET_NEWSTORENAME},SHOPIFY_STORE_KEYS=${_SHOPIFY_STORE_KEYS},SHOPIFY_OAUTH_SCOPES=${_SHOPIFY_OAUTH_SCOPES},SHOPIFY_API_VERSION=2025-01,API_KEY=${_API_KEY},PC_ID_1=${_PC_ID_1},PC_SECRET_1=${_PC_SECRET_1}'
      ]

substitutions:
  _AR_REPO: 'europe-west1-docker.pkg.dev/PROJECT/REPO'
  _SERVICE_NAME: 'order-collector'
  _REGION: 'europe-west1'
  _BASE_URL: 'https://your-cloud-run-url.a.run.app'
  _SHOPIFY_CLIENT_ID: ''
  _SHOPIFY_CLIENT_SECRET: ''
  _SHOPIFY_CLIENT_ID_NEWSTORENAME: ''
  _SHOPIFY_CLIENT_SECRET_NEWSTORENAME: ''
  _SHOPIFY_STORE_KEYS: '*'
  _SHOPIFY_OAUTH_SCOPES: 'read_orders,write_orders,read_products,write_products,read_content,write_content,read_inventory,write_inventory'
  _VITE_PRINT_RELAY_URL: ''
  _VITE_PRINT_RELAY_API_KEY: ''
  _VITE_PRINT_RELAY_PC_ID: ''
  _API_KEY: 'CHANGE_ME_API_KEY'
  _PC_ID_1: 'pc-lab-1'
  _PC_SECRET_1: 'SOME_LONG_SECRET'

images:
  - '${_AR_REPO}/order-collector:${SHORT_SHA}'

